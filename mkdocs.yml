site_name: Takanobu Amano @ U-Tokyo
site_description: Personal website of Takanobu Amano
site_url: https://amanotk.github.io/
site_author: Takanobu Amano
docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  logo: assets/images/icon.png
  favicon: assets/images/icon.png
  font: false
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md

plugins:
  - i18n:
      docs_structure: folder
      reconfigure_material: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
          theme:
            language: en
        - locale: ja
          name: 日本語
          build: true
          theme:
            language: ja
          nav:
            - ホーム: index.md
            - 研究: research.md
            - 教育: education.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  generator: false

copyright: Copyright &copy; 2026 Takanobu Amano
